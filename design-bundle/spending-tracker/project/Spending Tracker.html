<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spending Tracker — Mei & Baskara</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: "Plus Jakarta Sans", sans-serif; background: #EFE9E2; -webkit-font-smoothing: antialiased; }
  /* hide scrollbars inside phone screens */
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
  input { font-family: inherit; }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/screen-home.jsx"></script>
<script type="text/babel" src="app/screen-add.jsx"></script>
<script type="text/babel" src="app/screen-settle.jsx"></script>
<script type="text/babel" src="app/screen-reports.jsx"></script>
<script type="text/babel" src="app/screen-settings.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

<script type="text/babel" data-presets="react">
  const Phone = ({ screen, adding }) => (
    <IOSDevice>
      <SpendingApp initialScreen={screen} initialAdding={!!adding} />
    </IOSDevice>
  );
  const boardStyle = { background: 'transparent', boxShadow: 'none', overflow: 'visible', borderRadius: 48 };

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="app" title="Spending Tracker" subtitle="Mei & Baskara · cute & friendly · Bahasa Indonesia">
          <DCArtboard id="beranda" label="Beranda" width={402} height={874} style={boardStyle}>
            <Phone screen="home" />
          </DCArtboard>
          <DCArtboard id="tambah" label="Tambah Pengeluaran" width={402} height={874} style={boardStyle}>
            <Phone screen="home" adding />
          </DCArtboard>
          <DCArtboard id="saldo" label="Settle Up" width={402} height={874} style={boardStyle}>
            <Phone screen="settle" />
          </DCArtboard>
          <DCArtboard id="laporan" label="Laporan" width={402} height={874} style={boardStyle}>
            <Phone screen="reports" />
          </DCArtboard>
          <DCArtboard id="pengaturan" label="Pengaturan" width={402} height={874} style={boardStyle}>
            <Phone screen="settings" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
